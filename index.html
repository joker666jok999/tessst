<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест: Кто ты из мемов? 🤔</title>
    <style>
        body { margin: 0; padding: 0; background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; overflow: hidden; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        button { background: #0084ff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; }
        #screamer-wrap { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 9999; }
        #screamer-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Узнай, какой ты мем сегодня!</h1>
        <p>Нажми кнопку, чтобы пройти быстрый тест</p>
        <button onclick="boom()">Начать анализ</button>
    </div>

    <div id="screamer-wrap">
        <img id="screamer-img" src="scary.jpg">
        <audio id="screamer-snd">
            <source src="scream.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function boom() {
            const wrap = document.getElementById('screamer-wrap');
            const audio = document.getElementById('screamer-snd');
            wrap.style.display = 'block';
            audio.play().catch(e => console.log("Звук заблокирован"));
            if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen(); }
        }
    </script>
</body>
</html>
